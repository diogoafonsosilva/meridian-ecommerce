<style>
        body {
            background-color: #091518; /* Overriding with Brand Anchor deepest layer */
            margin: 0;
            overflow: hidden;
            color: #ede1d1;
        }

        .fade-in-up {
            animation: fadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .fade-in {
            animation: fadeIn 2.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .logo-container {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo-container:hover {
            transform: scale(1.02);
        }

        /* Ambient atmospheric glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(circle, rgba(243, 175, 0, 0.05) 0%, rgba(9, 21, 24, 0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<!-- Script for subtle mouse interaction -->
<script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.ambient-glow');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            if (glow) {
                glow.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            }
        });

        document.querySelector('button').addEventListener('click', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.7s ease-in-out';
            setTimeout(() => { window.location.href = 'resultados-da-pesquisa.html'; }, 700);
        });
